                selectLayer(newId);
            }

            if (imageUrl) {
                var tempImg = new Image();
                tempImg.onload = function() {
                    var origW = this.naturalWidth;
                    var origH = this.naturalHeight;
                    var maxW = 350;
                    var maxH = 300;
                    var scale = Math.min(maxW / origW, maxH / origH, 1);
                    createLayer(Math.round(origW * scale), Math.round(origH * scale));
                };
                tempImg.onerror = function() {
                    createLayer(width, height);
                };
                tempImg.src = imageUrl;
            } else {
                createLayer(width, height);
            }
        }

        function aiUpdateText(params) {
            var layerId = params.layerId;
            var text = params.text;
            if (!layerId || text == null) return;

            var layer = getLayerEl(layerId);
            if (!layer) {
                var allIds = getAllLayerIds();
                var idx = parseInt(layerId);
                if (!isNaN(idx) && idx >= 0 && idx < allIds.length) {
                    layer = getLayerEl(allIds[idx]);
                }
            }
            if (!layer) return;

            var textContent = layer.querySelector('.text-content');
            if (!textContent) {
                textContent = document.createElement('span');
                textContent.className = 'text-content';
                textContent.style.cssText = 'display:block;outline:none;';
                var children = Array.from(layer.childNodes);
                children.forEach(function(node) {
                    if (!node.classList || !node.classList.contains('layer-resize-handle')) {
                        textContent.appendChild(node);
                    }
                });
                layer.appendChild(textContent);
            }
            textContent.textContent = text;

            var itemEl = getLayerItemEl(layerId);
            if (itemEl) {
                var nameEl = itemEl.querySelector('.layer-name');
                if (nameEl && text.length > 12) {
                    nameEl.textContent = text.substring(0, 12) + '...';
                } else if (nameEl) {
                    nameEl.textContent = text;
                }
            }
        }

        function aiUpdateLayer(params) {
            var layerId = params.layerId;
            var layer = getLayerEl(layerId);
            if (!layer) {
                var allIds = getAllLayerIds();
                var idx = parseInt(layerId);
                if (!isNaN(idx) && idx >= 0 && idx < allIds.length) {
                    layer = getLayerEl(allIds[idx]);
                }
            }
            if (!layer) return;

            if (params.x != null) layer.style.left = params.x + 'px';
            if (params.y != null) layer.style.top = params.y + 'px';
            if (params.width != null) layer.style.width = params.width + 'px';
            if (params.height != null) layer.style.height = params.height + 'px';
            if (params.fontSize != null) layer.style.fontSize = params.fontSize + 'px';
            if (params.color) layer.style.color = params.color;
            if (params.fontWeight) layer.style.fontWeight = params.fontWeight;
            if (params.fontFamily) layer.style.fontFamily = params.fontFamily;
            if (params.fontStyle) layer.style.fontStyle = params.fontStyle;
            if (params.textDecoration) layer.style.textDecoration = params.textDecoration;
            if (params.lineHeight != null) layer.style.lineHeight = params.lineHeight + '';
            if (params.letterSpacing != null) layer.style.letterSpacing = params.letterSpacing + 'px';
            if (params.opacity != null) layer.style.opacity = params.opacity + '';
            if (params.textAlign) layer.style.textAlign = params.textAlign;
            if (params.borderRadius != null) layer.style.borderRadius = params.borderRadius + 'px';
            if (params.background) layer.style.background = params.background;
            if (params.zIndex != null) layer.style.zIndex = params.zIndex;

            if (params.text != null) {
                aiUpdateText({ layerId: layerId, text: params.text });
            }

            if (params.imageUrl != null || params.src != null || params.url != null) {
                var newImgUrl = params.imageUrl || params.src || params.url;
                var tempImg = new Image();
                tempImg.onload = function() {
                    var origW = this.naturalWidth;
                    var origH = this.naturalHeight;
                    var maxW = 350;
                    var maxH = 300;
                    var scale = Math.min(maxW / origW, maxH / origH, 1);
                    var newW = Math.round(origW * scale);
                    var newH = Math.round(origH * scale);
                    layer.style.width = newW + 'px';
                    layer.style.height = newH + 'px';

                    var imgEl = layer.querySelector('img');
                    var uploadArea = layer.querySelector('.image-upload-area');
                    var radius = params.borderRadius != null ? params.borderRadius : parseInt(layer.style.borderRadius) || 4;

                    if (imgEl) {
                        imgEl.src = newImgUrl;
                        imgEl.style.borderRadius = radius + 'px';
                    } else if (uploadArea) {
                        uploadArea.outerHTML = '<img src="' + newImgUrl + '" style="width:100%;height:100%;display:block;border-radius:' + radius + 'px;">';
                    }
                };
                tempImg.src = newImgUrl;
            }
        }

        function aiSetImage(params) {
            var layerId = params.layerId;
            var imageUrl = params.imageUrl || params.src || params.url;
            if (!layerId || !imageUrl) return;

            var layer = getLayerEl(layerId);
            if (!layer) {
                var allIds = getAllLayerIds();
                var idx = parseInt(layerId);
                if (!isNaN(idx) && idx >= 0 && idx < allIds.length) {
                    layer = getLayerEl(allIds[idx]);
                }
            }
            if (!layer) return;

            var tempImg = new Image();
            tempImg.onload = function() {
                var origW = this.naturalWidth;
                var origH = this.naturalHeight;
                var maxW = 350;
                var maxH = 300;
                var scale = Math.min(maxW / origW, maxH / origH, 1);
                var newW = Math.round(origW * scale);
                var newH = Math.round(origH * scale);
                layer.style.width = newW + 'px';
                layer.style.height = newH + 'px';

                var imgEl = layer.querySelector('img');
                var uploadArea = layer.querySelector('.image-upload-area');
                var radius = params.borderRadius != null ? params.borderRadius : parseInt(layer.style.borderRadius) || 4;

                if (imgEl) {
                    imgEl.src = imageUrl;
                    imgEl.style.borderRadius = radius + 'px';
                    imgEl.style.display = 'block';
                } else if (uploadArea) {
                    uploadArea.outerHTML = '<img src="' + imageUrl + '" style="width:100%;height:100%;display:block;border-radius:' + radius + 'px;">';
                }

                if (params.opacity != null) layer.style.opacity = params.opacity;
            };
            tempImg.src = imageUrl;
        }

        function aiDeleteLayer(params) {
            var layerId = params.layerId;
            var layer = getLayerEl(layerId);
            if (!layer) {
                var allIds = getAllLayerIds();
                var idx = parseInt(layerId);
                if (!isNaN(idx) && idx >= 0 && idx < allIds.length) {
                    layerId = allIds[idx];
                    layer = getLayerEl(layerId);
                }
            }
            if (!layer) return;

            selectedLayerId = layerId;
            deleteLayer();
        }

        function aiSetBackground(params) {
            var color = params.color || '#1a1a1a';
            document.getElementById('canvasArea').style.background = color;
        }

        function aiSetCanvasSize(params) {
            var w = params.width || 800;
            var h = params.height || 450;
            setCanvasSize(w, h);
            var preset = document.getElementById('canvasSizePreset');
            var key = w + 'x' + h;
            var presetOptions = {
                '800x450': '横版大图 800×450',
                '600x600': '方形 600×600',
                '450x800': '竖版 450×800',
                '1200x400': '宽横幅 1200×400'
            };
            if (presetOptions[key]) {
                for (var i = 0; i < preset.options.length; i++) {
                    if (preset.options[i].value === key) {
                        preset.selectedIndex = i;
                        break;
                    }
                }
                document.getElementById('canvasSizeInputs').style.display = 'none';
            } else {
                preset.value = 'custom';
                document.getElementById('canvasSizeInputs').style.display = 'flex';
                document.getElementById('canvasWidth').value = w;
                document.getElementById('canvasHeight').value = h;
            }
        }

        function aiApplyEffect(params) {
            var layerId = params.layerId;
            var effect = params.effect;
            var layer = getLayerEl(layerId);
            if (!layer) {
                var allIds = getAllLayerIds();
                var idx = parseInt(layerId);
                if (!isNaN(idx) && idx >= 0 && idx < allIds.length) {
                    layer = getLayerEl(allIds[idx]);
                }
            }
            if (!layer) return;

            switch (effect) {
                case 'glow':
                    layer.style.boxShadow = '0 0 20px rgba(108, 92, 231, 0.8), 0 0 40px rgba(108, 92, 231, 0.4)';
                    break;
                case 'shadow':
                    layer.style.boxShadow = '10px 10px 30px rgba(0, 0, 0, 0.5), -5px -5px 15px rgba(255, 255, 255, 0.1)';
                    break;
                case 'gradient':
                    layer.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                    break;
                case 'glass':
                    layer.style.background = 'rgba(255, 255, 255, 0.1)';
                    layer.style.backdropFilter = 'blur(10px)';
                    break;
                case 'neon':
                    layer.style.textShadow = '0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff00ff, 0 0 40px #ff00ff';
                    break;
                case 'emboss':
                    layer.style.textShadow = '1px 1px 0 #fff, -1px -1px 0 #333';
                    break;
            }
        }

        function aiClearAll() {
            document.querySelectorAll('#canvasArea .ad-layer').forEach(function(l) { l.remove(); });
            document.querySelectorAll('#layersList .layer-item').forEach(function(l) { l.remove(); });
            selectedLayerId = null;
            var titleEl = document.querySelector('#canvasArea .canvas-title');
            if (titleEl) titleEl.style.display = '';
        }

        function aiReorderLayer(params) {
            var direction = params.direction || 'up';
            var layerId = params.layerId != null ? String(params.layerId) : null;
            if (layerId) {
                var list = document.getElementById('layersList');
                var item = list.querySelector('.layer-item[data-layer-id="' + layerId + '"]');
                if (!item) { showToast('❌ 未找到图层 ' + layerId, true); return; }
                if (direction === 'front' || direction === 'top') {
                    list.appendChild(item);
                } else if (direction === 'back' || direction === 'bottom') {
                    list.insertBefore(item, list.firstChild);
                } else if (direction === 'up') {
                    var prev = item.previousElementSibling;
                    if (prev) list.insertBefore(item, prev);
                } else if (direction === 'down') {
                    var next = item.nextElementSibling;
                    if (next) list.insertBefore(next, item);
                }
                reindexLayers();
                selectLayer(layerId);
                showToast('✅ 图层层级已调整');
            } else if (direction === 'front' || direction === 'top') {
                bringToFront();
                showToast('✅ 已置顶');
            } else if (direction === 'back' || direction === 'bottom') {
                sendToBack();
                showToast('✅ 已置底');
            } else if (direction === 'up' && selectedLayerId) {
                var list = document.getElementById('layersList');
                var item = list.querySelector('.layer-item[data-layer-id="' + selectedLayerId + '"]');
                var prev = item && item.previousElementSibling;
                if (prev) { list.insertBefore(item, prev); reindexLayers(); showToast('✅ 上移一层'); }
                else showToast('✅ 已经在最上层');
            } else if (direction === 'down' && selectedLayerId) {
                var list = document.getElementById('layersList');
                var item = list.querySelector('.layer-item[data-layer-id="' + selectedLayerId + '"]');
                var next = item && item.nextElementSibling;
                if (next) { list.insertBefore(next, item); reindexLayers(); showToast('✅ 下移一层'); }
                else showToast('✅ 已经在最下层');
            }
        }

        function aiSwitchToProject(params) {
            var projectId = params.projectId;
            if (!projectId) { showToast('❌ 请指定要切换的项目ID', true); return; }
            if (currentProjectId && currentProjectId == projectId) {
                showToast('✅ 已在当前项目中');
                return;
            }
            currentProjectId = parseInt(projectId);
            window.history.replaceState({}, '', '/project/' + currentProjectId);
            loadProject(currentProjectId);
            showToast('✅ 已切换到项目 ' + projectId);
        }

        function aiPreviewProject(params) {
            var projectId = params.projectId;
            if (!projectId) {
                if (currentProjectId) {
                    projectId = currentProjectId;
                } else {
                    showToast('❌ 请指定要预览的项目ID', true);
                    return;
                }
            }
            var page = params.page != null ? parseInt(params.page) : 0;
            var width = window.innerWidth;
            var height = window.innerHeight;
            var previewUrl = '/preview?projectId=' + projectId + '&page=' + page;
            var w = window.open(previewUrl, 'adPreview', 'width=' + width + ',height=' + height + ',menubar=no,toolbar=no,location=no,status=no');
            if (!w) {
                window.location.href = previewUrl;
            }
            showToast('✅ 正在打开广告预览');
        }

        function aiNextPage() {
            if (!currentProjectId) { showToast('❌ 请先加载项目', true); return; }
            var currentIdx = -1;
            for (var i = 0; i < pages.length; i++) {
                if (pages[i].pageId === currentPageId) { currentIdx = i; break; }
            }
            if (currentIdx >= 0 && currentIdx < pages.length - 1) {
                switchPage(pages[currentIdx + 1].pageId);
                showToast('✅ 切换到下一页: ' + pages[currentIdx + 1].pageName);
            } else {
                addPage();
            }
        }

        function aiPrevPage() {
            if (!currentProjectId) { showToast('❌ 请先加载项目', true); return; }
            var currentIdx = -1;
            for (var i = 0; i < pages.length; i++) {
                if (pages[i].pageId === currentPageId) { currentIdx = i; break; }
            }
            if (currentIdx > 0) {
                switchPage(pages[currentIdx - 1].pageId);
                showToast('✅ 切换到上一页: ' + pages[currentIdx - 1].pageName);
            } else {
                showToast('✅ 已经是第一页');
            }
        }

        function aiCreateAdLayout(params) {
            var title = params.title || '主标题';
            var subtitle = params.subtitle || '';
            var cta = params.cta || '';
            var style = params.style || 'modern';
            var imageUrl = params.imageUrl || '';

            aiClearAll();

            var canvasW = parseInt(document.getElementById('canvasArea').style.width) || 800;
            var canvasH = parseInt(document.getElementById('canvasArea').style.height) || 450;

            if (style === 'modern') {
                aiSetBackground({ color: '#0f0c29' });
            } else if (style === 'warm') {
                aiSetBackground({ color: '#2d1b00' });
            } else if (style === 'clean') {
                aiSetBackground({ color: '#1a1a2e' });
            }

            var titleFontSize = style === 'modern' ? 38 : (style === 'warm' ? 36 : 32);
            var titleColor = style === 'modern' ? '#FFD700' : (style === 'warm' ? '#FF6B35' : '#00D2FF');
            var titleY = canvasH * 0.18;
            aiAddTextLayer({
                text: title, layerName: '主标题',
                x: (canvasW - 500) / 2, y: Math.round(titleY),
                width: 500, height: 70,
                fontSize: titleFontSize, color: titleColor,
                fontWeight: 'bold', textAlign: 'center',
                background: 'transparent'
            });

            if (subtitle) {
                aiAddTextLayer({
                    text: subtitle, layerName: '副标题',
                    x: (canvasW - 460) / 2, y: Math.round(titleY + 85),
                    width: 460, height: 45,
                    fontSize: 18, color: '#cccccc',
                    fontWeight: 'normal', textAlign: 'center',
                    background: 'transparent'
                });
            }

            aiAddImageLayer({
                layerName: '广告图片',
                x: (canvasW - 280) / 2, y: Math.round(canvasH * 0.45),
                width: 280, height: 160,
                imageUrl: imageUrl
            });

            if (cta) {
                aiAddTextLayer({
                    text: cta, layerName: '行动按钮',
                    x: (canvasW - 200) / 2, y: Math.round(canvasH * 0.85),
                    width: 200, height: 45,
                    fontSize: 18, color: '#ffffff',
                    fontWeight: 'bold', textAlign: 'center',
                    borderRadius: 25,
                    background: 'linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%)'
                });
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function quickAiAction(actionType) {
            var canvasArea = document.getElementById('canvasArea');
            var canvasW = parseInt(canvasArea.style.width) || canvasArea.clientWidth || 800;
            var canvasH = parseInt(canvasArea.style.height) || canvasArea.clientHeight || 450;

            var prompts = {
                'add_title': '请在画布上添加一个醒目的主标题文字图层，文字内容要有吸引力（比如"限时特惠"、"品质之选"等），放在画布上方居中位置，字号要大（32-38px），使用醒目的颜色。画布尺寸是' + canvasW + 'x' + canvasH + '。',
                'add_subtitle': '请在画布主标题下方添加一个副标题文字图层，用简洁的文字补充说明（比如"年度最值得期待的产品"），字号中等（18-20px），颜色柔和。画布尺寸是' + canvasW + 'x' + canvasH + '。',
                'create_layout': '请帮我创建一个完整的广告布局，包含：1)一个醒目的主标题 2)一个副标题 3)一个图片占位区域 4)一个行动号召按钮。画布尺寸是' + canvasW + 'x' + canvasH + '，使用' + (Math.random() > 0.5 ? 'modern' : 'clean') + '风格。',
                'add_cta': '请在画布底部居中位置添加一个行动号召按钮文字图层（比如"立即购买"、"了解更多"），圆角设计，使用渐变色背景。画布尺寸是' + canvasW + 'x' + canvasH + '。'
            };

            var prompt = prompts[actionType];
            if (!prompt) return;

            var input = document.getElementById('aiInput');
            input.value = prompt;
            sendAiMessage();
        }

        var aiCameraStream = null;

        function openCameraForVision() {
            var chatMessages = document.getElementById('aiMessages');
            addAiMessage('user', '[视觉识别] 正在打开摄像头...');

            var existing = document.getElementById('cameraModal');
            if (existing) existing.remove();

            var modal = document.createElement('div');
            modal.id = 'cameraModal';
            modal.className = 'camera-modal';
            modal.innerHTML =
                '<div class="camera-modal-mask" onclick="closeCameraModal()"></div>' +
                '<div class="camera-modal-body">' +
                    '<div class="camera-modal-header">' +
                        '<span>📷 动作识别 — 请在摄像头前做出动作</span>' +
                        '<button onclick="closeCameraModal()">✕</button>' +
                    '</div>' +
                    '<div class="camera-preview-wrap">' +
                        '<video id="cameraVideo" autoplay playsinline></video>' +
                        '<canvas id="cameraCanvas" style="display:none;"></canvas>' +
                    '</div>' +
                    '<div class="camera-modal-footer">' +
                        '<button id="cameraCaptureBtn" onclick="captureAndAnalyze()">📸 拍照识别</button>' +
                        '<button onclick="closeCameraModal()">取消</button>' +
                    '</div>' +
                '</div>';
            document.body.appendChild(modal);

            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                .then(function(stream) {
                    aiCameraStream = stream;
                    var video = document.getElementById('cameraVideo');
                    video.srcObject = stream;
                    video.play();
                })
                .catch(function(err) {
                    removeAiTyping();
                    addAiMessage('assistant', '无法打开摄像头，请检查权限设置：' + err.message);
                    closeCameraModal();
                });
        }

        function closeCameraModal() {
            if (aiCameraStream) {
                aiCameraStream.getTracks().forEach(function(track) { track.stop(); });
                aiCameraStream = null;
            }
            var modal = document.getElementById('cameraModal');
            if (modal) modal.remove();
        }

        function captureAndAnalyze() {
            var video = document.getElementById('cameraVideo');
            var canvas = document.getElementById('cameraCanvas');
            if (!video || !canvas) return;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            var base64 = canvas.toDataURL('image/jpeg', 0.85);
            closeCameraModal();
            showAiTyping();

            fetch('/api/ai/vision', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    image: base64,
                    prompt: '请描述画面中人物的动作、姿势、手势，以及所处的环境。如果是用户正在做某个动作或姿势，请详细分析。请用中文回复。'
                })
            })
            .then(function(res) {
                if (res.status === 401) { window.location.href = '/login'; return; }
                return res.json();
            })
            .then(function(data) {
                removeAiTyping();
                if (data && data.code === 200 && data.data) {
                    addAiMessage('assistant', data.data.content || '暂无分析结果');
                } else {
                    addAiMessage('assistant', '识别失败：' + (data ? data.message : '未知错误'));
                }
            })
            .catch(function(err) {
                removeAiTyping();
                addAiMessage('assistant', '网络错误，请稍后重试');
            });
        }

        function suggestAdCopy() {
            aiChatHistory = [];
            var container = document.getElementById('aiMessages');
            container.innerHTML = '';
            addAiMessage('assistant', '正在分析你的广告画布，生成文案建议...');
            showAiTyping();

            var canvasArea = document.getElementById('canvasArea');
            var contextInfo = '画布尺寸：' + canvasArea.clientWidth + 'x' + canvasArea.clientHeight + '。';

            var textLayers = canvasArea.querySelectorAll('.ad-layer.text-layer');
            if (textLayers.length > 0) {
                contextInfo += '现有文字：';
                textLayers.forEach(function(l) {
                    contextInfo += '"' + (l.textContent || '').trim() + '" ';
                });
            } else {
                contextInfo += '暂无文字内容。';
            }

            fetch('/api/ai/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [
                        { role: 'user', content: '请根据以下广告画布信息，给出3条有吸引力的广告文案建议，每条文案简洁有力，适合广告展示。\n' + contextInfo }
                    ]
                })
            })
            .then(function(res) {
                if (res.status === 401) { window.location.href = '/login'; return; }
                return res.json();
            })
            .then(function(data) {
                removeAiTyping();
                if (data && data.code === 200 && data.data) {
                    addAiMessage('assistant', data.data.content || '暂无建议');
                    aiChatHistory.push({ role: 'assistant', content: data.data.content || '暂无建议' });
                } else {
                    addAiMessage('assistant', '生成建议失败：' + (data ? data.message : '未知错误'));
                }
            })
            .catch(function(err) {
                removeAiTyping();
                addAiMessage('assistant', '网络错误，请稍后重试');
            });
        }

        var aiInputEl = document.getElementById('aiInput');
        if (aiInputEl) {
            aiInputEl.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            });
        }
    </script>

            <div class="ai-title"><span>🤖</span> AI 广告助手</div>

        </div>
        <div class="ai-messages" id="aiMessages">
            <div class="ai-message assistant">你好！我是AI广告助手，可以帮你设计广告文案、分析图片动作，有什么需要帮忙的吗？</div>
        </div>
        <div class="ai-actions" style="flex-wrap:wrap;">
            <button class="ai-action-btn primary" onclick="quickAiAction('add_title')" title="添加一个醒目的主标题">📝 添加标题</button>
            <button class="ai-action-btn" onclick="quickAiAction('add_subtitle')" title="添加副标题文字">📄 添加副标题</button>
            <button class="ai-action-btn" onclick="quickAiAction('create_layout')" title="一键生成完整广告布局">🎨 生成布局</button>
            <button class="ai-action-btn" onclick="quickAiAction('add_cta')" title="添加行动号召按钮">🔘 添加按钮</button>
            <button class="ai-action-btn" onclick="openCameraForVision()">📷 动作识别</button>
            <button class="ai-action-btn" onclick="suggestAdCopy()">💡 文案建议</button>
        </div>
        <div class="ai-input-area">
            <textarea id="aiInput" placeholder="输入你的问题..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAiMessage();}"></textarea>
            <button class="ai-send-btn" id="aiSendBtn" onclick="sendAiMessage()">➤</button>
        </div>
    </div>
</body>
</html>

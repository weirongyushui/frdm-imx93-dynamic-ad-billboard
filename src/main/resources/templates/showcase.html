<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广告展示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stage-wrapper {
            position: relative;
            transition: opacity 0.5s ease;
        }

        .stage-wrapper.fading { opacity: 0; }

        .stage {
            position: relative;
            overflow: hidden;
        }

        .stage .layer {
            position: absolute;
            overflow: hidden;
            box-sizing: border-box;
        }

        .stage .layer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stage .layer.text-layer {
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .nav-zone {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 50%;
            z-index: 10;
        }

        .nav-zone.left { left: 0; }
        .nav-zone.right { right: 0; }

        .info-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 20;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            pointer-events: none;
        }

        .dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }

        .dot.active {
            background: #6c5ce7;
            transform: scale(1.4);
        }

        .page-num {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
        }

        .project-name {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            font-weight: bold;
        }

        .nav-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.25);
            font-size: 12px;
            z-index: 20;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .nav-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.15);
            font-size: 36px;
            z-index: 20;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .nav-arrow.prev { left: 30px; }
        .nav-arrow.next { right: 30px; }

        .nav-arrow.flash { color: rgba(255,255,255,0.6); }

        .transition-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: all;
            transition: opacity 0.3s ease;
        }

        .transition-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .transition-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(108, 92, 231, 0.2);
            border-top-color: #6c5ce7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .transition-title {
            font-size: 22px;
            color: #fff;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .transition-info {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .transition-tag {
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 15px;
            color: #fff;
            background: rgba(108, 92, 231, 0.25);
            border: 1px solid rgba(108, 92, 231, 0.4);
        }

        .transition-bar {
            width: 280px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .transition-bar-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            border-radius: 3px;
            animation: barFill 1.5s ease-out forwards;
        }

        @keyframes barFill { from { width: 0; } to { width: 100%; } }

        .empty-message {
            color: rgba(255,255,255,0.3);
            font-size: 18px;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="transition-overlay hidden" id="transitionOverlay">
        <div class="transition-spinner"></div>
        <div class="transition-title">正在根据用户特征切换广告...</div>
        <div class="transition-info">
            <span class="transition-tag" id="transAge">年龄: --</span>
            <span class="transition-tag" id="transGender">性别: --</span>
        </div>
        <div class="transition-bar">
            <div class="transition-bar-fill"></div>
        </div>
    </div>
    <div class="stage-wrapper" id="stageWrapper">
        <div class="stage" id="stage"></div>
    </div>

    <div class="nav-zone left" id="navLeft"></div>
    <div class="nav-zone right" id="navRight"></div>

    <div class="nav-arrow prev">◀</div>
    <div class="nav-arrow next">▶</div>

    <div class="nav-hint" id="navHint">点击画面左右翻页 · 滚轮切换 · ESC 退出</div>

    <div class="info-bar" id="infoBar"></div>

    <div class="empty-message" id="emptyMsg" style="display:none;">暂无广告项目，请先在编辑器中创建</div>

    <script>
        var slides = [];
        var currentIndex = 0;
        var lastActionTimestamp = 0;

        function getQuery(name) {
            var params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        (function() {
            enterFullscreen();
            fetch('/api/ad/projects/showcase')
                .then(function(res) {
                    if (res.status === 401) { window.location.href = '/login'; return; }
                    return res.json();
                })
                .then(function(data) {
                    if (!data || data.code !== 200 || !data.data || data.data.length === 0) {
                        document.getElementById('emptyMsg').style.display = 'block';
                        return;
                    }
                    var idsParam = getQuery('ids');
                    var idSet = null;
                    if (idsParam) {
                        idSet = {};
                        idsParam.split(',').forEach(function(s){ var t = s.trim(); if (t) idSet[t] = true; });
                    }
                    data.data.forEach(function(project) {
                        if (idSet && !idSet[String(project.projectId)]) return;
                        if (project.pages && project.pages.length > 0) {
                            project.pages.forEach(function(page) {
                                slides.push({
                                    projectId: project.projectId,
                                    projectName: project.name,
                                    pageName: page.pageName,
                                    canvasWidth: project.canvasWidth,
                                    canvasHeight: project.canvasHeight,
                                    backgroundColor: page.backgroundColor || project.backgroundColor,
                                    layers: page.layers || []
                                });
                            });
                        }
                    });
                    if (slides.length === 0) {
                        document.getElementById('emptyMsg').style.display = 'block';
                        return;
                    }
                    renderInfoBar();
                    renderSlide(0);
                });
        })();

        function getScale(cw, ch) {
            var scaleX = window.innerWidth / cw;
            var scaleY = window.innerHeight / ch;
            return Math.min(scaleX, scaleY);
        }

        function enterFullscreen() {
            var el = document.documentElement;
            if (!document.fullscreenElement && (el.requestFullscreen || el.webkitRequestFullscreen)) {
                try {
                    if (el.requestFullscreen) el.requestFullscreen();
                    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                } catch (e) {}
            }
        }

        function renderSlide(index) {
            if (slides.length === 0) return;
            if (index < 0) index = slides.length - 1;
            if (index >= slides.length) index = 0;
            currentIndex = index;

            var slide = slides[index];
            var wrapper = document.getElementById('stageWrapper');
            var stage = document.getElementById('stage');

            wrapper.classList.add('fading');

            setTimeout(function() {
                stage.innerHTML = '';

                var cw = slide.canvasWidth || 800;
                var ch = slide.canvasHeight || 450;
                var scale = getScale(cw, ch);

                stage.style.width = cw + 'px';
                stage.style.height = ch + 'px';
                stage.style.background = slide.backgroundColor || '#1a1a1a';
                wrapper.style.transform = 'scale(' + scale + ')';

                if (slide.layers) {
                    slide.layers.forEach(function(layerDTO, i) {
                        var layer = document.createElement('div');
                        layer.className = 'layer';
                        if (layerDTO.layerType === 'text') layer.classList.add('text-layer');

                        layer.style.left = (layerDTO.posX || 0) + 'px';
                        layer.style.top = (layerDTO.posY || 0) + 'px';
                        layer.style.width = (layerDTO.width || 200) + 'px';
                        layer.style.height = (layerDTO.height || 50) + 'px';
                        layer.style.zIndex = layerDTO.zIndex != null ? layerDTO.zIndex : i;

                        if (layerDTO.layerType === 'text') {
                            layer.textContent = layerDTO.textContent || '';
                            if (layerDTO.fontSize) layer.style.fontSize = layerDTO.fontSize + 'px';
                            if (layerDTO.fontColor) layer.style.color = layerDTO.fontColor;
                            if (layerDTO.fontWeight) layer.style.fontWeight = layerDTO.fontWeight;
                            if (layerDTO.fontFamily) layer.style.fontFamily = layerDTO.fontFamily;
                            if (layerDTO.fontStyle) layer.style.fontStyle = layerDTO.fontStyle;
                            if (layerDTO.textDecoration) layer.style.textDecoration = layerDTO.textDecoration;
                            if (layerDTO.lineHeight != null) layer.style.lineHeight = layerDTO.lineHeight;
                            if (layerDTO.letterSpacing != null) layer.style.letterSpacing = layerDTO.letterSpacing + 'px';
                            if (layerDTO.opacity != null) layer.style.opacity = layerDTO.opacity;
                            if (layerDTO.textAlign) layer.style.textAlign = layerDTO.textAlign;
                        } else if (layerDTO.layerType === 'image' && layerDTO.imageUrl) {
                            var img = document.createElement('img');
                            img.src = layerDTO.imageUrl;
                            layer.appendChild(img);
                        }

                        if (layerDTO.borderRadius) layer.style.borderRadius = layerDTO.borderRadius + 'px';

                        applyEffects(layer, layerDTO);
                        stage.appendChild(layer);
                    });
                }

                updateInfoBar();
                wrapper.classList.remove('fading');
            }, 250);
        }

        function applyEffects(layer, data) {
            var effect = data.effect;
            if (!effect) return;

            var styles = [];
            var filters = [];

            if (effect.shadowEnabled) {
                styles.push((effect.shadowX || 0) + 'px ' + (effect.shadowY || 0) + 'px ' + (effect.shadowBlur || 10) + 'px ' + (effect.shadowColor || 'rgba(0,0,0,0.5)'));
            }
            if (effect.glowEnabled) {
                styles.push('0 0 ' + (effect.glowSize || 10) + 'px ' + (effect.glowColor || 'rgba(108,92,231,0.8)'));
            }
            if (styles.length > 0) layer.style.boxShadow = styles.join(', ');

            if (effect.borderEnabled) {
                layer.style.border = (effect.borderWidth || 1) + 'px ' + (effect.borderColor || '#6c5ce7') + ' ' + (effect.borderStyle || 'solid');
            }

            if (effect.brightness != null && effect.brightness !== 100) filters.push('brightness(' + effect.brightness + '%)');
            if (effect.contrast != null && effect.contrast !== 100) filters.push('contrast(' + effect.contrast + '%)');
            if (effect.saturation != null && effect.saturation !== 100) filters.push('saturate(' + effect.saturation + '%)');
            if (effect.blur && effect.blur > 0) filters.push('blur(' + effect.blur + 'px)');
            if (filters.length > 0) layer.style.filter = filters.join(' ');

            if (effect.perspectiveEnabled) {
                layer.style.transform = 'perspective(500px) rotateX(' + (effect.perspectiveY || 0) + 'deg) rotateY(' + (effect.perspectiveX || 0) + 'deg)';
            }
        }

        function renderInfoBar() {
            var bar = document.getElementById('infoBar');
            bar.innerHTML = '<div class="dots" id="dots"></div>' +
                '<span class="page-num" id="pageNum"></span>' +
                '<span class="project-name" id="projectName"></span>';
            var dots = document.getElementById('dots');
            for (var i = 0; i < slides.length; i++) {
                var dot = document.createElement('div');
                dot.className = 'dot';
                if (i === 0) dot.classList.add('active');
                dots.appendChild(dot);
            }
            updateInfoBar();
        }

        function updateInfoBar() {
            var dots = document.querySelectorAll('.dot');
            dots.forEach(function(d, i) {
                if (i === currentIndex) d.classList.add('active');
                else d.classList.remove('active');
            });
            document.getElementById('pageNum').textContent = (currentIndex + 1) + ' / ' + slides.length;
            var s = slides[currentIndex];
            document.getElementById('projectName').textContent = s.projectName + ' - ' + s.pageName;
        }

        document.getElementById('navLeft').addEventListener('click', function() {
            flashArrow('prev');
            renderSlide(currentIndex - 1);
        });

        document.getElementById('navRight').addEventListener('click', function() {
            enterFullscreen();
            flashArrow('next');
            renderSlide(currentIndex + 1);
        });

        document.addEventListener('wheel', function(e) {
            enterFullscreen();
            e.preventDefault();
            if (e.deltaY > 0) {
                flashArrow('next');
                renderSlide(currentIndex + 1);
            } else {
                flashArrow('prev');
                renderSlide(currentIndex - 1);
            }
        }, { passive: false });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (document.fullscreenElement) {
                    var el = document;
                    if (el.exitFullscreen) el.exitFullscreen();
                    else if (el.webkitExitFullscreen) el.webkitExitFullscreen();
                }
                window.close();
            } else if (e.key === 'ArrowRight') {
                renderSlide(currentIndex + 1);
            } else if (e.key === 'ArrowLeft') {
                renderSlide(currentIndex - 1);
            }
        });

        function flashArrow(dir) {
            var el = document.querySelector('.nav-arrow.' + dir);
            if (!el) return;
            el.classList.add('flash');
            clearTimeout(el._timeout);
            el._timeout = setTimeout(function() { el.classList.remove('flash'); }, 400);
        }

        window.addEventListener('resize', function() {
            if (slides.length > 0) {
                var s = slides[currentIndex];
                var scale = getScale(s.canvasWidth || 800, s.canvasHeight || 450);
                document.getElementById('stageWrapper').style.transform = 'scale(' + scale + ')';
            }
        });

        // ========== IMX93 动作轮询 + 自动切换 ==========
        var switchingAd = false;

        function showTransition(portraitJson, callback) {
            var overlay = document.getElementById('transitionOverlay');
            try {
                var p = typeof portraitJson === 'string' ? JSON.parse(portraitJson) : portraitJson;
                document.getElementById('transAge').textContent = '年龄: ' + (p.ageRange || '--');
                document.getElementById('transGender').textContent = '性别: ' + (p.gender || '--');
            } catch (e) {
                document.getElementById('transAge').textContent = '年龄: --';
                document.getElementById('transGender').textContent = '性别: --';
            }
            // 重置进度条动画
            var bar = overlay.querySelector('.transition-bar-fill');
            bar.style.animation = 'none';
            bar.offsetHeight;
            bar.style.animation = 'barFill 1.5s ease-out forwards';

            overlay.classList.remove('hidden');
            switchingAd = true;
            setTimeout(function() {
                overlay.classList.add('hidden');
                switchingAd = false;
                if (callback) callback();
            }, 1800);
        }

        function findSlideByProjectId(projectId) {
            for (var i = 0; i < slides.length; i++) {
                if (slides[i].projectId == projectId) return i;
            }
            return -1;
        }

        function pollAction() {
            fetch('/api/action/last')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (!data || data.code !== 200 || !data.data) return;
                    var ts = data.data.timestamp || 0;
                    if (ts <= lastActionTimestamp || slides.length === 0) return;
                    lastActionTimestamp = ts;

                    var action = data.data.action;

                    // AUTO_SWITCH：照片分析完成 → 过渡页 → 切换广告
                    if (action === 'AUTO_SWITCH' && data.data.matchedAdIds) {
                        if (switchingAd) return;
                        var ids = String(data.data.matchedAdIds).split(',');
                        var targetIndex = -1;
                        for (var i = 0; i < ids.length; i++) {
                            var idx = findSlideByProjectId(parseInt(ids[i]));
                            if (idx >= 0) { targetIndex = idx; break; }
                        }
                        showTransition(data.data.portrait || '{}', function() {
                            if (targetIndex >= 0) {
                                renderSlide(targetIndex);
                            }
                        });
                        return;
                    }

                    // USER_LEFT：用户离开 → 切换到下一个推荐
                    if (action === 'USER_LEFT' && data.data.nextProjectId) {
                        if (switchingAd) return;
                        var nextIdx = findSlideByProjectId(parseInt(data.data.nextProjectId));
                        if (nextIdx >= 0) {
                            var overlay = document.getElementById('transitionOverlay');
                            overlay.querySelector('.transition-title').textContent = '正在为你切换广告...';
                            showTransition('{}', function() {
                                renderSlide(nextIdx);
                                overlay.querySelector('.transition-title').textContent = '正在根据用户特征切换广告...';
                            });
                        }
                        return;
                    }

                    // 手势翻页
                    if (action === 'LEFT_SWIPE') {
                        renderSlide(currentIndex - 1);
                    } else if (action === 'RIGHT_SWIPE') {
                        renderSlide(currentIndex + 1);
                    } else if (action === 'CHANGE_AD') {
                        renderSlide(Math.floor(Math.random() * slides.length));
                    }
                })
                .catch(function() {});
        }
        setInterval(pollAction, 500);
    </script>
</body>
</html>

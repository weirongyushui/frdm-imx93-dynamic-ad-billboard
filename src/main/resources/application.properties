spring.application.name=advertisement

# MySQL Database Configuration

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/advertisement?serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=sia.advertisement.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Spring MVC Configuration
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/,classpath:/templates/

# Server Configuration
server.port=8083

# AI Configuration (DeepSeek)
ai.analysis.enabled=false
ai.api.key=
ai.api.url=https://api.deepseek.com
ai.api.model=deepseek-chat
ai.api.model-vision=deepseek-v2-vision

# Action Recognition Configuration
action.token=abc123

# Board Configuration
board.user-id=1

# Folder Watch（图片目录，AI JSON 通过 HTTP 获取）
watch.photos-dir=C:\\Users\\xffff\\Desktop\\user\\input_photos
# AI 识别结果 HTTP 地址
watch.person-url=http://192.168.43.11:8000/output_results/backend_events/person_latest.json
watch.action-url=http://192.168.43.11:8000/output_results/backend_events/action_latest.json
# 画像 JSON HTTP 轮询间隔（毫秒），检测年龄性别变化自动推送
watch.person-poll-interval=1000
# 动作 JSON HTTP 轮询间隔（毫秒）
watch.action-poll-interval=500
# Face Recognition (SeetaFace6 via SmartJavaAI)
face.enabled=true
face.threshold=0.6

# File Upload Configuration
upload.dir=photo
upload.base-url=/photo
# Server URL for external access (used by AI services to access images)
server.public-url=http://localhost:8083
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=0
